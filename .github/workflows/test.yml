name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run test:run
      - run: npx tsc --noEmit

  rust-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y nasm libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Create sidecar stubs
        run: |
          mkdir -p src-tauri/binaries/gs-res
          for bin in ffmpeg ffprobe gs; do
            touch "src-tauri/binaries/${bin}-x86_64-unknown-linux-gnu"
          done

      - name: Check formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --lib -- -D warnings

  rust-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # NASM is required for mozjpeg
      - name: Install NASM (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Install NASM (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install nasm

      - name: Install NASM (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install nasm -y

      # Tauri build deps for Ubuntu
      - name: Install Tauri deps (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Create sidecar stubs
        shell: bash
        run: |
          mkdir -p src-tauri/binaries/gs-res
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            triple="x86_64-unknown-linux-gnu"
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            triple="aarch64-apple-darwin"
          else
            triple="x86_64-pc-windows-msvc"
            ext=".exe"
          fi
          for bin in ffmpeg ffprobe gs; do
            touch "src-tauri/binaries/${bin}-${triple}${ext}"
          done

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

  rust-benchmarks:
    needs: [rust-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y nasm libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Create sidecar stubs
        run: |
          mkdir -p src-tauri/binaries/gs-res
          for bin in ffmpeg ffprobe gs; do
            touch "src-tauri/binaries/${bin}-x86_64-unknown-linux-gnu"
          done

      - name: Run benchmarks
        run: cargo bench --manifest-path src-tauri/Cargo.toml --bench compression_bench

      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: src-tauri/target/criterion/
