name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            target: aarch64-apple-darwin
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Platform dependencies ────────────────────────────────────────

      - name: Install NASM (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Install Tauri deps (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install NASM (macOS)
        if: matrix.platform == 'macos-latest'
        run: brew install nasm

      - name: Install NASM + 7-Zip (Windows)
        if: matrix.platform == 'windows-latest'
        run: choco install nasm 7zip -y

      # ── Download sidecars ────────────────────────────────────────────

      - name: Download FFmpeg (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          bash scripts/download-ffmpeg.sh
          # evermeet.cx provides universal binaries — ensure both target names exist
          for bin in ffmpeg ffprobe; do
            if [ ! -f "src-tauri/binaries/${bin}-x86_64-apple-darwin" ]; then
              cp "src-tauri/binaries/${bin}-aarch64-apple-darwin" "src-tauri/binaries/${bin}-x86_64-apple-darwin"
            fi
          done
          ls -la src-tauri/binaries/

      - name: Download Ghostscript (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          bash scripts/download-gs.sh
          # Universal binary — ensure both target names exist
          if [ ! -f "src-tauri/binaries/gs-x86_64-apple-darwin" ]; then
            cp "src-tauri/binaries/gs-aarch64-apple-darwin" "src-tauri/binaries/gs-x86_64-apple-darwin"
          fi

      - name: Download FFmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: .\scripts\download-ffmpeg.ps1

      - name: Download Ghostscript (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: .\scripts\download-gs.ps1

      - name: Download FFmpeg (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          TARGET="x86_64-unknown-linux-gnu"
          curl -L "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz" -o /tmp/ffmpeg-linux.tar.xz
          tar xf /tmp/ffmpeg-linux.tar.xz -C /tmp
          EXTRACT_DIR=$(find /tmp -maxdepth 1 -type d -name "ffmpeg-*" | head -1)
          cp "$EXTRACT_DIR/bin/ffmpeg" "src-tauri/binaries/ffmpeg-$TARGET"
          cp "$EXTRACT_DIR/bin/ffprobe" "src-tauri/binaries/ffprobe-$TARGET"
          chmod +x "src-tauri/binaries/ffmpeg-$TARGET" "src-tauri/binaries/ffprobe-$TARGET"
          rm -rf /tmp/ffmpeg-linux.tar.xz "$EXTRACT_DIR"
          ls -la src-tauri/binaries/

      - name: Download Ghostscript (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          TARGET="x86_64-unknown-linux-gnu"
          GS_VERSION="10.07.0"
          GS_VERSION_NODOTS="10070"
          # Download official pre-built Linux binary (matches Windows/macOS resource set)
          curl -L "https://github.com/ArtifexSoftware/ghostpdl-downloads/releases/download/gs${GS_VERSION_NODOTS}/ghostscript-${GS_VERSION}-linux-x86_64.tgz" -o /tmp/gs-linux.tgz
          tar xf /tmp/gs-linux.tgz -C /tmp
          EXTRACT_DIR=$(find /tmp -maxdepth 1 -type d -name "ghostscript-*" | head -1)
          # Copy the gs binary
          cp "$EXTRACT_DIR/gs-${GS_VERSION}-linux-x86_64/gs" "src-tauri/binaries/gs-$TARGET"
          chmod +x "src-tauri/binaries/gs-$TARGET"
          # Copy Ghostscript resource files (fonts, init scripts, ICC profiles)
          GS_SHARE_DIR="$EXTRACT_DIR/gs-${GS_VERSION}-linux-x86_64/share/ghostscript/${GS_VERSION}"
          if [ -d "$GS_SHARE_DIR" ]; then
            rm -rf src-tauri/binaries/gs-res
            mkdir -p src-tauri/binaries/gs-res
            cp -R "$GS_SHARE_DIR/Resource" src-tauri/binaries/gs-res/
            [ -d "$GS_SHARE_DIR/lib" ] && cp -R "$GS_SHARE_DIR/lib" src-tauri/binaries/gs-res/
            [ -d "$GS_SHARE_DIR/iccprofiles" ] && cp -R "$GS_SHARE_DIR/iccprofiles" src-tauri/binaries/gs-res/
          else
            echo "Warning: Could not find share dir at $GS_SHARE_DIR, listing extracted contents:"
            find "$EXTRACT_DIR" -maxdepth 3 -type d
          fi
          rm -rf /tmp/gs-linux.tgz "$EXTRACT_DIR"
          ls -la src-tauri/binaries/

      # ── Build & Release ──────────────────────────────────────────────

      - name: Install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Compressions v__VERSION__"
          releaseBody: "See the assets to download and install."
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: true
          args: ${{ matrix.args }}
