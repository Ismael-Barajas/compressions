<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1024" height="1024" rx="0" fill="#0e0e10"/>

  <!-- Three stacked compression bars — getting smaller toward bottom -->
  <!-- Top bar: widest -->
  <rect x="192" y="272" width="640" height="128" fill="#d4a053"/>
  <!-- Middle bar -->
  <rect x="288" y="448" width="448" height="128" fill="#d4a053" opacity="0.65"/>
  <!-- Bottom bar: narrowest -->
  <rect x="384" y="624" width="256" height="128" fill="#d4a053" opacity="0.35"/>
</svg>
